<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noir Gold Menu — Black Haven</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Raleway:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --black:#060606; --maroon:#5c0a14; --gold:#c9a84c; --gold-bright:#e8c86a; 
  --cream:#f0e8d8; --muted:#7a6a58; --dim:#3a3020;
}
body{background:var(--black); color:var(--cream); font-family:'Raleway',sans-serif; overflow-x:hidden; scroll-behavior:smooth}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:.35}

nav{position:fixed;top:0;left:0;right:0;z-index:900;padding:18px 60px;display:flex;justify-content:space-between;align-items:center;background:rgba(6,6,6,.9);border-bottom:.5px solid rgba(201,168,76,.15);backdrop-filter:blur(12px)}
.nav-logo{font-family:'Cinzel',serif;font-size:13px;color:var(--gold);letter-spacing:4px;text-decoration:none}
.nav-back{color:var(--muted); font-size:10px; text-decoration:none; letter-spacing:3px; text-transform:uppercase; transition:color .3s}
.nav-back:hover{color:var(--gold)}

.page-hero{padding:140px 60px 80px;text-align:center;position:relative;overflow:hidden}
.hero-bg{position:absolute;inset:0;background:radial-gradient(ellipse at center top,rgba(92,10,20,.1) 0%,transparent 60%)}
.hero-bg-lines{position:absolute;inset:0;background-image:linear-gradient(to right,rgba(201,168,76,.025) 1px,transparent 1px),linear-gradient(to bottom,rgba(201,168,76,.025) 1px,transparent 1px);background-size:80px 80px}

.page-title{font-family:'Cormorant Garamond',serif;font-size:clamp(48px,8vw,100px);font-weight:300;line-height:.9;color:var(--cream);margin-bottom:20px}
.page-title em{font-style:italic;color:var(--gold)}
.page-subtitle{font-size:12px;color:var(--muted);letter-spacing:3px;max-width:500px;margin:0 auto;line-height:2}

/* MENU NOIR GOLD */
.menu-noir{
  width:340px;min-height:520px;background:#0a0a0a;padding:40px 36px;position:relative;font-family:Georgia,serif;border:.5px solid rgba(201,168,76,.15);margin:0 auto;
}
.menu-noir-border{position:absolute;inset:12px;border:.5px solid rgba(201,168,76,.2);pointer-events:none}
.mn-corner{position:absolute;width:14px;height:14px;border-color:var(--gold);border-style:solid}
.mn-corner.tl{top:16px;left:16px;border-width:1px 0 0 1px}
.mn-corner.tr{top:16px;right:16px;border-width:1px 1px 0 0}
.mn-corner.bl{bottom:16px;left:16px;border-width:0 0 1px 1px}
.mn-corner.br{bottom:16px;right:16px;border-width:0 1 1 0}
.mn-logo{font-family:Georgia,serif;font-size:22px;color:var(--gold);letter-spacing:6px;text-align:center;margin:16px 0 4px;font-weight:300}
.mn-tagline{font-size:8px;color:rgba(138,122,80,.7);letter-spacing:4px;text-align:center;margin-bottom:18px;text-transform:uppercase}
.mn-divider{width:60px;height:.5px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 18px}
.mn-section{font-size:8px;color:rgba(138,122,80,.8);letter-spacing:3px;text-transform:uppercase;margin:16px 0 10px}
.mn-item{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:8px}
.mn-name{font-size:13px;color:rgba(240,232,216,.9);font-weight:300}
.mn-dots{flex:1;border-bottom:.5px dotted rgba(58,48,32,.8);margin:0 8px 3px}
.mn-price{font-size:12px;color:var(--gold);font-style:italic}
.mn-footer{text-align:center;margin-top:20px;font-size:7px;color:rgba(74,64,48,.8);letter-spacing:2px;text-transform:uppercase}

/* Reveal animation */
.reveal{opacity:0;transform:translateY(24px);transition:opacity .7s,transform .7s}
.reveal.visible{opacity:1;transform:translateY(0)}

@media(max-width:768px){
  nav{padding:16px 24px}
  .page-hero{padding:100px 24px 60px}
  .menu-noir{width:100%;min-height:auto;padding:24px}
}

</style>
</head>
<body>

<nav>
  <a href="#" class="nav-logo">FK</a>
  <a href="#" class="nav-back">← Back</a>
</nav>

<div class="page-hero">
  <div class="hero-bg"></div>
  <div class="hero-bg-lines"></div>
  <h1 class="page-title">Oak<br><em>Tree<br><em>Cafe</em></h1>
  <p class="page-subtitle">Smell of freshly brewed coffee with tasty cakes </p>
</div>

<div class="menu-noir reveal">
  <div class="menu-noir-border"></div>
  <div class="mn-corner tl"></div><div class="mn-corner tr"></div>
  <div class="mn-corner bl"></div><div class="mn-corner br"></div>
  <div class="mn-logo">Oak Tree Cafe</div>
  <div class="mn-tagline">Cakes · Coffee · Aroma</div>
  <div class="mn-divider"></div>
  <div class="mn-section">Drinks</div>
  <div class="mn-item"><span class="mn-name">Iced Americano</span><span class="mn-dots"></span><span class="mn-price">$40</span></div>
  <div class="mn-item"><span class="mn-name">Golden Latte</span><span class="mn-dots"></span><span class="mn-price">$50</span></div>
  <div class="mn-item"><span class="mn-name">
Freddo cappuccino</span><span class="mn-dots"></span><span class="mn-price">$30</span></div>
  <div class="mn-item"><span class="mn-name">Macchiato</span><span class="mn-dots"></span><span class="mn-price">$50</span></div>
  <div class="mn-section">Cakes</div>
  <div class="mn-item"><span class="mn-name">Doughnuts</span><span class="mn-dots"></span><span class="mn-price">$20</span></div>
   <div class="mn-item"><span class="mn-name">Creme Brulee</span><span class="mn-dots"></span><span class="mn-price">$30</span></div>
  <div class="mn-item"><span class="mn-name">Chocolava Cake</span><span class="mn-dots"></span><span class="mn-price">$30</span></div>
  <div class="mn-divider" style="margin-top:20px"></div>
  <div class="mn-footer">oaktreecafe.co · @oaktreecafe.official</div>
</div>

<script>
document.querySelectorAll('.reveal').forEach(el=>{
  const observer = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){e.target.classList.add('visible'); observer.unobserve(e.target);}
    });
  }, {threshold:.1});
  observer.observe(el);
});
</script>

</body>
</html>
