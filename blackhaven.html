<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Maroon Depth — Virtual Visiting Card</title>
<link href="https://fonts.googleapis.com/css2?family=Mirza:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,300;1,400&family=Cinzel:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--black:#060606;--maroon:#5c0a14;--maroon-light:#8a1020;--gold:#c9a84c;--cream:#f0e8d8;--muted:#7a6a58;}
body{background:var(--black);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;padding:2rem;color:var(--cream);}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:.3}
nav{position:fixed;top:0;left:0;right:0;z-index:900;padding:16px 40px;display:flex;justify-content:space-between;align-items:center;background:rgba(6,6,6,.92);border-bottom:.5px solid rgba(201,168,76,.15);backdrop-filter:blur(12px)}
.nav-logo{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:4px;text-decoration:none}
.nav-back{font-size:10px;color:var(--muted);text-decoration:none;letter-spacing:3px;text-transform:uppercase;transition:color .3s}
.nav-back:hover{color:var(--gold)}
.page-label{font-size:9px;letter-spacing:5px;color:rgba(201,168,76,.4);text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:12px}
.page-label::before,.page-label::after{content:'';width:28px;height:.5px;background:var(--gold);opacity:.4}
.hint{font-size:9px;color:rgba(201,168,76,.35);letter-spacing:3px;text-transform:uppercase;margin-top:1.5rem;display:flex;align-items:center;gap:8px}
.hint-icon{display:inline-block;animation:spin 3s ease-in-out infinite;font-style:normal}
@keyframes spin{0%,100%{transform:rotateY(0)}50%{transform:rotateY(40deg)}}

.scene{width:360px;height:290px;perspective:1200px;cursor:pointer}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.4,.2,.2,1)}
.scene.flipped .card-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}
.face-back{transform:rotateY(180deg)}

/* FRONT */
.front{background:linear-gradient(135deg,#0a0210 0%,#0d0418 100%);border:.5px solid rgba(92,10,20,.7);position:relative;display:flex;align-items:center}
.stripe{position:absolute;left:0;top:0;bottom:0;width:5px;background:linear-gradient(to bottom,var(--maroon-light),var(--maroon),transparent)}
.glow-corner{position:absolute;bottom:-40px;right:-30px;width:160px;height:160px;background:radial-gradient(circle,rgba(92,10,20,.4) 0%,transparent 65%)}
.glow-top{position:absolute;top:-20px;left:60px;width:100px;height:80px;background:radial-gradient(circle,rgba(138,16,32,.15) 0%,transparent 70%)}
.gold-top{position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,transparent,var(--gold),transparent)}
.front-ct{padding:26px 26px 26px 36px;position:relative;z-index:1}
.f-name{font-family:'Mirza',serif;font-size:28px;color:var(--cream);font-weight:400;letter-spacing:.5px;line-height:1.15}
.f-role{font-size:8px;color:rgba(201,168,76,.6);letter-spacing:3px;text-transform:uppercase;margin-top:7px}
.f-rule{width:44px;height:.5px;background:var(--maroon-light);margin:16px 0}
.f-url{font-size:9px;color:rgba(122,106,88,.65)}
.f-bh-bg{position:absolute;right:-10px;bottom:-14px;font-family:'Mirza',serif;font-size:96px;color:rgba(92,10,20,.09);line-height:1;z-index:0}

/* BACK */
.back{background:#06040f;border:.5px solid rgba(92,10,20,.5);position:relative;display:flex;flex-direction:column;justify-content:center;padding:32px 36px;overflow:hidden}
.back::after{content:'BH';font-family:'Mirza',serif;font-size:100px;color:rgba(92,10,20,.08);position:absolute;right:-8px;bottom:-18px;line-height:1}
.back::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,transparent,var(--maroon-light),transparent)}
.b-label{font-size:7px;color:rgba(201,168,76,.38);letter-spacing:3px;text-transform:uppercase;margin-bottom:12px}
.b-studio{font-family:'Mirza',serif;font-size:13px;color:rgba(240,232,216,.4);margin-bottom:14px}
.b-divider{width:36px;height:.5px;background:var(--maroon);margin-bottom:16px}
.b-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:10px;color:rgba(240,232,216,.55)}
.b-icon{width:13px;height:13px;fill:rgba(201,168,76,.45);flex-shrink:0}

@media(max-width:500px){.scene{width:300px;height:240px}}
</style>
</head>
<body>
<nav>
  <a href="visitingcards.html" class="nav-logo">Black Haven</a>
  <a href="visitingcards.html" class="nav-back">&#8592; Back</a>
