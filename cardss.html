
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Fareen Kashmira — Chef</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
  --ink:    #130801;
  --deep:   #1E0C03;
  --roast:  #321205;
  --mid:    #5A2409;
  --warm:   #9B4A18;
  --cream:  #FFF6E8;
  --cream2: #F0DEC2;
  --cream3: #DCCAA4;
  --gold:   #C08C2E;
  --gold2:  #DDB054;
}
  body {
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }
  .bg-ambient { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .bg-ambient::before {
    content: '';
    position: absolute;
    top: -20%; left: -20%;
    width: 60%; height: 60%;
    background: radial-gradient(ellipse, rgba(201,168,76,0.07) 0%, transparent 70%);
    animation: drift1 12s ease-in-out infinite alternate;
  }
  .bg-ambient::after {
    content: '';
    position: absolute;
    bottom: -20%; right: -20%;
    width: 60%; height: 60%;
    background: radial-gradient(ellipse, rgba(201,168,76,0.05) 0%, transparent 70%);
    animation: drift2 15s ease-in-out infinite alternate;
  }
  @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(40px,30px); } }
  @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-30px,-40px); } }
  .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .particle {
    position: absolute;
    width: 1px; height: 1px;
    background: var(--gold);
    border-radius: 50%;
    animation: float-up linear infinite;
    opacity: 0;
  }
  @keyframes float-up {
    0% { opacity: 0; transform: translateY(0) scale(1); }
    10% { opacity: 0.6; }
    90% { opacity: 0.2; }
    100% { opacity: 0; transform: translateY(-100vh) scale(0.3); }
  }

  /* Scene */
  .scene {
    position: relative;
    z-index: 1;
    width: 420px;
    height: 260px;
    perspective: 1200px;
    cursor: pointer;
    user-select: none;
  }
  .card {
    width: 100%;
    height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.9s cubic-bezier(0.45, 0.05, 0.55, 0.95);
    animation: float-card 6s ease-in-out infinite;
  }
  .card.flipped {
    transform: rotateY(180deg) !important;
    animation: none !important;
  }
  @keyframes float-card {
    0%, 100% { transform: rotateY(0deg) rotateX(0deg) translateY(0px); }
    25%  { transform: rotateY(3deg) rotateX(-2deg) translateY(-6px); }
    50%  { transform: rotateY(-2deg) rotateX(1deg) translateY(-10px); }
    75%  { transform: rotateY(2deg) rotateX(2deg) translateY(-4px); }
  }

  .face {
    position: absolute;
    inset: 0;
    backface-visibility: hidden;
    border-radius: 16px;
    overflow: hidden;
    border: 1px solid rgba(201,168,76,0.25);
    box-shadow:
      0 0 0 0.5px rgba(201,168,76,0.15),
      0 30px 80px rgba(0,0,0,0.8),
      0 0 40px rgba(201,168,76,0.08),
      inset 0 1px 0 rgba(201,168,76,0.2);
  }

  /* FRONT */
  .face-front {
    background: linear-gradient(135deg, #0d0d0d 0%, #111111 40%, #0f0f0f 100%);
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .face-front::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .face-front::after {
    content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold-dim), transparent);
  }
  .front-inner {
    display: flex;
    align-items: center;
    gap: 28px;
    padding: 0 44px;
  }

  /* Logo circle — mix-blend-mode:screen strips black bg */
  .logo-wrap {
    flex-shrink: 0;
    width: 92px; height: 92px;
    border-radius: 50%;
    border: 1.5px solid rgba(201,168,76,0.4);
    display: flex;
    align-items: center;
    justify-content: center;
    position: relative;
    background: #000;
    box-shadow: 0 0 20px rgba(201,168,76,0.1);
    animation: pulse-ring 3s ease-in-out infinite;
    overflow: hidden;
  }
  @keyframes pulse-ring {
    0%, 100% { box-shadow: 0 0 20px rgba(201,168,76,0.1); }
    50%       { box-shadow: 0 0 30px rgba(201,168,76,0.25); }
  }
  .bh-logo-img {
    width: 78px; height: 78px;
    object-fit: contain;
    mix-blend-mode: screen;
    display: block;
  }

  .text-block { display: flex; flex-direction: column; gap: 4px; }
  .card-name {
    font-family: 'Cinzel', serif;
    font-size: 18px; font-weight: 500;
    letter-spacing: 3px;
    color: var(--gold-light);
    text-transform: uppercase;
    line-height: 1.2;
  }
  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 13px; font-weight: 300; font-style: italic;
    color: rgba(201,168,76,0.6);
    letter-spacing: 2px;
    margin-top: 2px;
  }
  .divider-line {
    width: 40px; height: 0.5px;
    background: linear-gradient(90deg, var(--gold-dim), transparent);
    margin-top: 8px;
  }
  .brand-name {
    font-family: 'Cinzel', serif;
    font-size: 9px; letter-spacing: 4px;
    color: rgba(201,168,76,0.35);
    text-transform: uppercase;
    margin-top: 6px;
  }

  .corner {
    position: absolute;
    width: 18px; height: 18px;
    border-color: rgba(201,168,76,0.3);
    border-style: solid;
  }
  .corner-tl { top: 14px; left: 14px; border-width: 1px 0 0 1px; }
  .corner-tr { top: 14px; right: 14px; border-width: 1px 1px 0 0; }
  .corner-bl { bottom: 14px; left: 14px; border-width: 0 0 1px 1px; }
  .corner-br { bottom: 14px; right: 14px; border-width: 0 1px 1px 0; }

  .shimmer {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(105deg, transparent 40%, rgba(201,168,76,0.06) 50%, transparent 60%);
    animation: shimmer 4s ease-in-out infinite;
  }
  @keyframes shimmer {
    0% { transform: translateX(-100%); }
    40%, 100% { transform: translateX(200%); }
  }

  /* BACK */
  .face-back {
    background: linear-gradient(145deg, #0e0e0e 0%, #131313 50%, #0a0a0a 100%);
    transform: rotateY(180deg);
    display: flex;
    flex-direction: column;
    align-items: flex-start;
    justify-content: center;
    padding: 30px 36px;
  }
  .face-back::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
  }
  .back-header {
    font-family: 'Cinzel', serif;
    font-size: 9px; letter-spacing: 5px;
    color: rgba(201,168,76,0.35);
    text-transform: uppercase;
    margin-bottom: 18px;
  }
  .contact-list { display: flex; flex-direction: column; gap: 12px; width: 100%; }
  .contact-item { display: flex; align-items: center; gap: 14px; text-decoration: none; }
  .contact-icon {
    width: 28px; height: 28px;
    border-radius: 6px;
    border: 1px solid rgba(201,168,76,0.2);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    background: rgba(201,168,76,0.04);
    transition: all 0.2s;
  }
  .contact-icon svg { width: 13px; height: 13px; fill: var(--gold); opacity: 0.8; }
  .contact-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 10.5px; font-weight: 300;
    color: rgba(245,240,232,0.65);
    letter-spacing: 0.5px;
    transition: color 0.2s;
  }
  .contact-item:hover .contact-text { color: var(--gold-light); }
  .contact-item:hover .contact-icon { border-color: rgba(201,168,76,0.5); background: rgba(201,168,76,0.08); }
  .back-divider {
    width: 100%; height: 0.5px;
    background: linear-gradient(90deg, rgba(201,168,76,0.2), transparent);
    margin: 14px 0;
  }

  /* Hint */
  .hint {
    position: absolute;
    bottom: -40px; left: 50%;
    transform: translateX(-50%);
    font-family: 'Montserrat', sans-serif;
    font-size: 9px; letter-spacing: 3px;
    color: rgba(201,168,76,0.25);
    text-transform: uppercase;
    white-space: nowrap;
    animation: blink 3s ease-in-out infinite;
  }
  @keyframes blink {
    0%, 100% { opacity: 0.3; }
    50% { opacity: 0.7; }
  }
</style>
</head>

// Click-only flip toggle
const scene = document.getElementById('scene');
const card  = document.getElementById('card');
const hint  = document.getElementById('hint');
let flipped = false;

scene.addEventListener('click', () => {
  flipped = !flipped;
  if (flipped) {
    card.classList.add('flipped');
    hint.textContent = 'Click to flip back';
  } else {
    card.classList.remove('flipped');
    hint.textContent = 'Click to flip';
  }
});

// Tilt on mouse move (not when flipped)
scene.addEventListener('mousemove', e => {
  if (flipped) return;
  const r = scene.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width - 0.5;
  const y = (e.clientY - r.top)  / r.height - 0.5;
  card.style.animation = 'none';
  card.style.transform = `rotateY(${x*18}deg) rotateX(${-y*12}deg)`;
});

scene.addEventListener('mouseleave', () => {
  if (!flipped) {
    card.style.transform = '';
    card.style.animation = 'float-card 6s ease-in-out infinite';
  }
});
</script>
