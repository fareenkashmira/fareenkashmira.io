<!DOCTYPE html>
<html lang="en">
<head>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root { --accent: #ff7e5f; --dark: #2d1b14; }
        body { background: #fdf5e6; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; padding: 50px; }
        
        .menu-card {
            width: 300px; background: white; border-radius: 20px; padding: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: 2px solid var(--dark);
        }

        .header { text-align: center; color: var(--dark); }
        
        /* Animated Coffee Icon */
        .brew-container {
            height: 100px; display: flex; justify-content: center; align-items: center; position: relative;
        }
        .coffee-icon { color: var(--dark); animation: tilt 3s ease-in-out infinite; }
        .steam {
            position: absolute; top: 10px; width: 2px; height: 15px; background: #ccc;
            opacity: 0; animation: rise 2s infinite;
        }
        
        @keyframes tilt { 0%, 100% { transform: rotate(-5deg); } 50% { transform: rotate(5deg); } }
        @keyframes rise {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 0.8; }
            100% { transform: translateY(-20px); opacity: 0; }
        }

        .menu-item {
            display: flex; justify-content: space-between; margin: 15px 0;
            padding-bottom: 5px; border-bottom: 1px dashed #ddd;
        }
        .menu-item:hover { color: var(--accent); transform: scale(1.02); transition: 0.2s; }
    </style>
</head>
<body>
    <div class="menu-card">
        <div class="header">
            <h2>Kooky Kafe</h2>
            <div class="brew-container">
                <div class="steam" style="left: 45%; animation-delay: 0s;"></div>
                <div class="steam" style="left: 50%; animation-delay: 0.5s;"></div>
                <div class="steam" style="left: 55%; animation-delay: 0.2s;"></div>
                <i data-lucide="coffee" class="coffee-icon" size="48"></i>
            </div>
        </div>
        <div class="menu-item"><span>Neon Espresso</span> <span>$4.50</span></div>
        <div class="menu-item"><span>Cloudy Latte</span> <span>$5.25</span></div>
        <div class="menu-item"><span>Kooky Cold Brew</span> <span>$6.00</span></div>
    </div>
    <script>lucide.createIcons();</script>
</body>
</html>
