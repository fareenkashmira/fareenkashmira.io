<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Categories</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet">

  <style>
    :root {
      --navy:#0f1e3d;
      --gold:#c9a84c;
      --gold-light:#e5c97a;
      --white:#ffffff;
      --blush:#fce8ee;
    }

    * {
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body {
      font-family:'DM Sans', sans-serif;
      background:linear-gradient(160deg,#ffffff 0%,#fdf4e0 60%,#eef3ff 100%);
      display:flex;
      justify-content:center;
      align-items:center;
      min-height:100vh;
      color:var(--navy);
    }

    .wrapper {
      width:90%;
      max-width:420px;
      text-align:center;
    }

    h1 {
      font-family:'Playfair Display', serif;
      font-size:2.2rem;
      font-weight:900;
      margin-bottom:10px;
    }

    h1 em {
      color:var(--gold);
      font-style:italic;
    }

    p {
      font-size:.9rem;
      color:#555;
      margin-bottom:30px;
    }

    .buttons {
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .btn {
      text-decoration:none;
      padding:14px;
      border-radius:6px;
      font-size:.8rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      font-weight:500;
      border:1px solid rgba(26,45,90,.15);
      background:#fff;
      color:var(--navy);
      transition:all .25s ease;
      position:relative;
      overflow:hidden;
    }

    .btn:hover {
      transform:translateY(-2px);
      box-shadow:0 10px 25px rgba(0,0,0,.08);
      border-color:var(--gold);
      color:var(--gold);
    }

    .btn.primary {
      background:var(--navy);
      color:#fff;
      border:none;
    }

    .btn.primary:hover {
      background:var(--gold);
      color:#fff;
    }

    .divider {
      width:50px;
      height:2px;
      background:linear-gradient(90deg,var(--gold),var(--blush));
      margin:20px auto 30px;
    }

  </style>
</head>
<body>

  <div class="wrapper">

    <h1>Website <em>Design</em></h1>
    <p>Select your category to get started</p>
    <div class="divider"></div>

    <div class="buttons">

      <a href="portfolio.html" class="btn primary">Portfolio</a>

      <a href="ecommerce.html" class="btn">E-Commerce</a>

      <a href="restaurant.html" class="btn">Qutub Darbar</a>

      <a href="medical.html" class="btn">Nilo Beauty Products</a>

      <a href="luxury.html" class="btn">Luxury Brand</a>

      <a href="kizalpropertiesllp.html" class="btn">Kizal Properties LLP</a>

    </div>

  </div>

</body>
</html>
