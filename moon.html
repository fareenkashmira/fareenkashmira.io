<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moonlit Hero Page</title>
    <style>
        :root {
            --space-bg: #05070a;
            --moon-color: #f5f5f5;
            --glow: rgba(255, 255, 255, 0.4);
        }

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: var(--space-bg);
            font-family: 'Inter', sans-serif;
            overflow: hidden; /* Keeps the focus on the hero section */
            cursor: none; /* Hides the default cursor */
        }

        /* Hero Section Styling */
        .hero {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            color: white;
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: -2px;
            margin-bottom: 10px;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.7;
        }

        /* The Moon Cursor */
        #moon-cursor {
            position: fixed;
            width: 40px;
            height: 40px;
            background: var(--moon-color);
            border-radius: 50%;
            pointer-events: none; /* Allows clicking "through" the moon */
            transform: translate(-50%, -50%);
            box-shadow: 
                inset -8px -4px 0px rgba(0,0,0,0.1), /* Moon craters detail */
                0 0 20px var(--glow);
            z-index: 9999;
            transition: transform 0.1s ease-out; /* Smooths the movement */
        }

        /* Tiny craters for detail */
        #moon-cursor::after {
            content: '';
            position: absolute;
            top: 20%;
            left: 20%;
            width: 8px;
            height: 8px;
            background: rgba(0,0,0,0.05);
            border-radius: 50%;
            box-shadow: 12px 15px 0 rgba(0,0,0,0.05), 5px 22px 0 rgba(0,0,0,0.05);
        }
    </style>
</head>
<body>

    <div id="moon-cursor"></div>

    <section class="hero">
        <h1>Lunar Odyssey</h1>
        <p>Explore the darkness. Guide the light.</p>
    </section>

    <script>
        const moon = document.getElementById('moon-cursor');

        // Update moon position on mouse move
        document.addEventListener('mousemove', (e) => {
            moon.style.left = e.clientX + 'px';
            moon.style.top = e.clientY + 'px';
        });

        // Add a "pulsing" effect when clicking
        document.addEventListener('mousedown', () => {
            moon.style.transform = 'translate(-50%, -50%) scale(1.5)';
        });

        document.addEventListener('mouseup', () => {
            moon.style.transform = 'translate(-50%, -50%) scale(1)';
        });
    </script>
</body>
</html>
