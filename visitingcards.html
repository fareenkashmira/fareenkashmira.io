<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visiting Cards — Black Haven</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

<style>
:root {
  --white:#fff;
  --navy:#1a2d5a;
  --navy-deep:#0f1e3d;
  --gold:#c9a84c;
  --blush:#fce8ee;
  --text:#4a5878;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
  font-family:'DM Sans',sans-serif;
  background:#fff;
  color:var(--navy);
}

/* NAV */
nav{
  position:fixed;
  top:0;left:0;right:0;
  background:#fff;
  padding:1.2rem 2rem;
  display:flex;
  justify-content:space-between;
  align-items:center;
  border-bottom:1px solid #eee;
  z-index:1000;
}
.nav-logo{
  font-family:'Playfair Display',serif;
  font-weight:900;
}
.nav-logo span{color:var(--gold);}

/* HERO */
.page-hero{
  padding:8rem 2rem 3rem;
  text-align:center;
}
.page-hero h1{
  font-family:'Playfair Display',serif;
  font-size:2.5rem;
}
.page-hero em{color:var(--gold);}
.page-hero p{
  margin-top:1rem;
  color:var(--text);
}

/* SECTION */
.cards-section{
  padding:2rem;
}

/* STACKED BUTTONS */
.cards-grid{
  display:flex;
  flex-direction:column;
  gap:1rem;
  max-width:420px;
  margin:2rem auto;
}

/* BUTTON CARD */
.card-btn{
  display:flex;
  align-items:center;
  gap:1rem;
  text-decoration:none;
  border:1px solid #eee;
  padding:0.8rem;
  border-radius:10px;
  transition:.25s;
}
.card-btn:hover{
  transform:translateY(-3px);
  box-shadow:0 10px 25px rgba(0,0,0,.08);
}

/* THUMB */
.card-btn-thumb{
  width:90px;
  height:70px;
  border-radius:8px;
}

/* COLORS */
.thumb-classic{background:linear-gradient(135deg,#0f1e3d,#2e4a82);}
.thumb-rose{background:linear-gradient(135deg,#4a1528,#c9607a);}
.thumb-midnight{background:linear-gradient(135deg,#0a0a14,#1e1e3c);}
.thumb-pearl{background:linear-gradient(135deg,#e8e0d5,#bfaf98);}

/* TEXT */
.card-btn-name{
  font-family:'Playfair Display',serif;
  font-weight:700;
}
.card-tag{
  font-size:.7rem;
  color:var(--gold);
}

/* ARROW */
.order-arrow{
  margin-left:auto;
  width:30px;height:30px;
  background:var(--navy);
  color:#fff;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:.7rem;
}
.card-btn:hover .order-arrow{
  background:var(--gold);
}

/* CTA */
.cta{
  text-align:center;
  padding:3rem 2rem;
  background:var(--navy-deep);
  color:#fff;
}
.cta a{
  display:inline-block;
  margin-top:1rem;
  background:#25D366;
  color:#fff;
  padding:.8rem 1.5rem;
  text-decoration:none;
  border-radius:4px;
}
</style>
</head>

<body>

<section class="page-hero">
  <h1>Virtual Visiting <em>Cards</em></h1>
  <p>Select a design & order instantly via WhatsApp</p>
</section>

<section class="cards-section">

<div class="cards-grid">

<!-- 1 -->
<a href="https://wa.me/+917011403207?text=Navy%20Classic%20Card" class="card-btn">
  <div class="card-btn-thumb thumb-classic"></div>
  <div>
    <div class="card-btn-name">Signature Navy</div>
    <div class="card-tag">Most Popular</div>
  </div>
  <div class="order-arrow"><i class="fas fa-arrow-right"></i></div>
</a>

<!-- 2 -->
<a href="https://wa.me/+917011403207?text=Rose%20Luxe%20Card" class="card-btn">
  <div class="card-btn-thumb thumb-rose"></div>
  <div>
    <div class="card-btn-name">Rose Luxe</div>
    <div class="card-tag">Elegant</div>
  </div>
  <div class="order-arrow"><i class="fas fa-arrow-right"></i></div>
</a>

<!-- 3 -->
<a href="https://wa.me/+917011403207?text=Midnight%20Card" class="card-btn">
  <div class="card-btn-thumb thumb-midnight"></div>
  <div>
    <div class="card-btn-name">Midnight Pro</div>
    <div class="card-tag">Minimal</div>
  </div>
  <div class="order-arrow"><i class="fas fa-arrow-right"></i></div>
</a>

<!-- 4 -->
<a href="https://wa.me/+917011403207?text=Pearl%20White%20Card" class="card-btn">
  <div class="card-btn-thumb thumb-pearl"></div>
  <div>
    <div class="card-btn-name">Pearl Elite</div>
    <div class="card-tag">Luxury</div>
  </div>
  <div class="order-arrow"><i class="fas fa-arrow-right"></i></div>
</a>

</div>

</section>

<section class="cta">
  <h3>Need a custom design?</h3>
  <a href="https://wa.me/+917011403207">Chat on WhatsApp</a>
</section>

</body>
</html>
