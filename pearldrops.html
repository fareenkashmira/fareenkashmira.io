<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pearl Elite — Virtual Visiting Card</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400;1,600&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Cinzel:wght@400;600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--navy:#0f1e3d;--maroon:#8b0022;--gold:#c9a84c;--stone:#8a8070;}
body{background:linear-gradient(160deg,#0a1428 0%,#0f1e3d 45%,#1a0a12 100%);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;padding:2rem;color:var(--navy);}
nav{position:fixed;top:0;left:0;right:0;z-index:900;padding:16px 40px;display:flex;justify-content:space-between;align-items:center;background:rgba(10,20,40,.9);border-bottom:.5px solid rgba(201,168,76,.15);backdrop-filter:blur(12px)}
.nav-logo{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:4px;text-decoration:none}
.nav-back{font-size:10px;color:rgba(201,168,76,.5);text-decoration:none;letter-spacing:3px;text-transform:uppercase;transition:color .3s}
.nav-back:hover{color:var(--gold)}
.page-label{font-size:9px;letter-spacing:5px;color:rgba(201,168,76,.4);text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:12px}
.page-label::before,.page-label::after{content:'';width:28px;height:.5px;background:var(--gold);opacity:.4}
.hint{font-size:9px;color:rgba(201,168,76,.35);letter-spacing:3px;text-transform:uppercase;margin-top:1.5rem;display:flex;align-items:center;gap:8px}
.hint-icon{display:inline-block;animation:spin 3s ease-in-out infinite;font-style:normal}
@keyframes spin{0%,100%{transform:rotateY(0)}50%{transform:rotateY(40deg)}}

.scene{width:360px;height:290px;perspective:1200px;cursor:pointer}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.4,.2,.2,1)}
.scene.flipped .card-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}
.face-back{transform:rotateY(180deg)}

.front{background:linear-gradient(145deg,#f8f3ec 0%,#ede5d5 60%,#e4daca 100%);border:.5px solid rgba(201,168,76,.4);position:relative;display:flex;align-items:stretch}
.front-left{width:6px;flex-shrink:0;background:linear-gradient(to bottom,var(--gold),var(--maroon),var(--gold))}
.front-ct{flex:1;padding:28px 24px;position:relative;z-index:1;display:flex;flex-direction:column;justify-content:center}
.pearl-sheen{position:absolute;top:0;right:0;bottom:0;left:6px;background:linear-gradient(120deg,rgba(255,255,255,.18) 0%,transparent 55%);pointer-events:none;z-index:0}
.f-tag{font-size:7px;color:rgba(139,0,34,.5);letter-spacing:4px;text-transform:uppercase;margin-bottom:14px}
.f-name{font-family:'Playfair Display',serif;font-size:22px;color:var(--navy);letter-spacing:.5px;line-height:1.2;margin-bottom:7px}
.f-role{font-family:'Cormorant Garamond',serif;font-size:11px;color:var(--stone);letter-spacing:2px;font-style:italic;margin-bottom:16px}
.f-rule{width:40px;height:1px;background:linear-gradient(90deg,var(--gold),transparent);margin-bottom:16px}
.f-url{font-size:8px;color:var(--stone);letter-spacing:1.5px}
.front-mono{display:flex;align-items:center;justify-content:center;width:72px;height:72px;border:1px solid rgba(201,168,76,.3);border-radius:50%;margin-right:26px;flex-shrink:0;align-self:center;position:relative;z-index:1}
.front-mono span{font-family:'Playfair Display',serif;font-size:20px;font-style:italic;color:var(--navy);letter-spacing:1px}
.top-rule{position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,var(--maroon),var(--gold),var(--maroon))}

.back{background:linear-gradient(145deg,#f5f0e8,#ede5d8);border:.5px solid rgba(201,168,76,.35);position:relative;display:flex;flex-direction:column;justify-content:center;padding:34px 36px}
.back::before{content:'';position:absolute;top:0;left:0;right:0;height:1.5px;background:linear-gradient(90deg,var(--maroon),var(--gold),var(--maroon))}
.back::after{content:'BH';font-family:'Playfair Display',serif;font-size:110px;font-style:italic;color:rgba(15,30,61,.04);position:absolute;right:-6px;bottom:-16px;line-height:1}
.b-label{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:10px;color:rgba(139,0,34,.5);letter-spacing:2px;margin-bottom:18px}
.b-row{display:flex;align-items:center;gap:10px;margin-bottom:11px;font-size:10px;color:rgba(15,30,61,.65)}
.b-icon{width:12px;height:12px;fill:var(--gold);flex-shrink:0}

@media(max-width:500px){.scene{width:300px;height:240px}}
</style>
</head>
<body>
<nav>
  <a href="visitingcards.html" class="nav-logo">Black Haven</a>
  <a href="visitingcards.html" class="nav-back">&#8592; Back</a>
