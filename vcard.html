<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kooky Kafe — Digital Business Card</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Cinzel:wght@400;500;600&family=Montserrat:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --ink:    #130801;
    --deep:   #1E0C03;
    --roast:  #321205;
    --warm:   #9B4A18;
    --gold:   #C08C2E;
    --gold-light: #DDB054;
    --cream:  #FFF6E8;
  }
  body {
    background: var(--cream);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Montserrat', sans-serif;
    overflow: hidden;
  }

  /* Ambient Background */
  .bg-ambient { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .bg-ambient::before {
    content: ''; position: absolute; top: -20%; left: -20%; width: 60%; height: 60%;
    background: radial-gradient(ellipse, rgba(155, 74, 24, 0.07) 0%, transparent 70%);
    animation: drift 12s ease-in-out infinite alternate;
  }
  @keyframes drift { from { transform: translate(0,0); } to { transform: translate(40px,30px); } }

  .particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }
  .particle {
    position: absolute; width: 1px; height: 1px;
    background: var(--gold); border-radius: 50%;
    animation: float-up linear infinite; opacity: 0;
  }
  @keyframes float-up {
    0% { opacity: 0; transform: translateY(0); }
    10% { opacity: 0.6; }
    100% { opacity: 0; transform: translateY(-100vh); }
  }

  /* Scene & Card */
  .scene {
    position: relative; z-index: 1;
    width: 420px; height: 260px;
    perspective: 1200px; cursor: pointer;
  }
  .card {
    width: 100%; height: 100%;
    position: relative; transform-style: preserve-3d;
    transition: transform 0.8s cubic-bezier(0.4, 0, 0.2, 1);
    animation: float-card 6s ease-in-out infinite;
  }
  .card.flipped { transform: rotateY(180deg) !important; animation: none !important; }
  @keyframes float-card {
    0%, 100% { transform: rotateY(0deg) translateY(0px); }
    50% { transform: rotateY(-2deg) translateY(-10px); }
  }

  .face {
    position: absolute; inset: 0;
    backface-visibility: hidden; border-radius: 16px;
    overflow: hidden; border: 1px solid rgba(192, 140, 46, 0.2);
    box-shadow: 0 30px 80px rgba(0,0,0,0.7);
  }

  /* Front Design */
  .face-front {
    background: linear-gradient(135deg, #0d0d0d 0%, var(--deep) 100%);
    display: flex; align-items: center; justify-content: center;
  }
  .shimmer {
    position: absolute; inset: 0; pointer-events: none;
    background: linear-gradient(105deg, transparent 40%, rgba(192, 140, 46, 0.05) 50%, transparent 60%);
    animation: shimmer 4s ease-in-out infinite;
  }
  @keyframes shimmer { from { transform: translateX(-100%); } to { transform: translateX(200%); } }

  .corner { position: absolute; width: 18px; height: 18px; border-color: rgba(192, 140, 46, 0.3); border-style: solid; }
  .corner-tl { top: 14px; left: 14px; border-width: 1px 0 0 1px; }
  .corner-br { bottom: 14px; right: 14px; border-width: 0 1px 1px 0; }

  .front-inner { display: flex; align-items: center; gap: 28px; padding: 0 40px; }
  .logo-wrap {
    width: 80px; height: 80px; border-radius: 50%;
    border: 1.5px solid var(--gold); background: #000;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; color: var(--gold); font-size: 40px;
  }

  .card-name { font-family: 'Cinzel', serif; font-size: 18px; letter-spacing: 3px; color: var(--gold-light); text-transform: uppercase; }
  .card-title { font-family: 'Cormorant Garamond', serif; font-size: 13px; font-style: italic; color: rgba(192, 140, 46, 0.6); }

  /* Back Design */
  .face-back {
    background: #0f0f0f; transform: rotateY(180deg);
    display: flex; flex-direction: column; padding: 30px 36px; justify-content: center;
  }
  .contact-item { 
    display: flex; align-items: center; gap: 14px; 
    text-decoration: none; margin-bottom: 12px;
    transition: 0.2s;
  }
  .contact-icon {
    width: 28px; height: 28px; border-radius: 6px;
    background: rgba(192, 140, 46, 0.05); border: 1px solid rgba(192, 140, 46, 0.2);
    display: flex; align-items: center; justify-content: center;
  }
  .contact-icon svg { width: 14px; height: 14px; fill: var(--gold); }
  .contact-text { font-size: 11px; color: rgba(255, 255, 255, 0.7); letter-spacing: 0.5px; }
  .contact-item:hover .contact-text { color: var(--gold-light); }
</style>
</head>
<body>

<div class="bg-ambient"></div>
<div class="particles" id="particles"></div>

<div class="scene" id="scene">
  <div class="card" id="card">
    <div class="face face-front">
      <div class="corner corner-tl"></div>
      <div class="corner corner-br"></div>
      <div class="shimmer"></div>
      <div class="front-inner">
        <div class="logo-wrap">K</div>
        <div>
          <div class="card-name">Kooky Kafe</div>
          <div class="card-title">Artisanal Brews & Bites</div>
        </div>
      </div>
    </div>

    <div class="face face-back">
      <a href="https://wa.me/919876543210" class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24"><path d="M12.031 6.172c-3.181 0-5.767 2.586-5.768 5.766-.001 1.298.38 2.27 1.019 3.287l-.582 2.128 2.182-.573c.978.58 1.911.928 3.145.929 3.178 0 5.767-2.587 5.768-5.766 0-3.18-2.587-5.771-5.764-5.771zm3.392 8.244c-.144.405-.837.774-1.17.824-.299.045-.677.063-1.092-.069-.252-.08-.575-.187-.988-.365-1.739-.751-2.874-2.512-2.961-2.628-.086-.117-.718-.953-.718-1.816 0-.862.453-1.287.614-1.455.161-.168.346-.21.462-.21h.335c.108 0 .252-.042.395.293l.536 1.294c.056.135.088.272.016.417l-.24.38c-.072.115-.144.183-.024.385.12.202.533.876 1.144 1.419.787.7 1.448.918 1.65.1.202-.1.32-.213.483-.162.164.05.514.243.606.289.091.047.161.07.243.21.082.141.082.811-.062 1.216z"/></svg>
        </div>
        <div class="contact-text">WhatsApp: +91 98765 43210</div>
      </a>

      <a href="https://fareenkashmira.co.in/kkmenu.html" class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24"><path d="M11 9H9V2H7v7H5V2H3v7c0 2.12 1.66 3.84 3.75 3.97V22h2.5v-9.03C11.34 12.84 13 11.12 13 9V2h-2v7zm5-3v8h2.5v8H21V2c-2.76 0-5 2.24-5 4z"/></svg>
        </div>
        <div class="contact-text">View Digital Menu</div>
      </a>

      <a href="mailto:hello@kookykafe.com" class="contact-item">
        <div class="contact-icon">
          <svg viewBox="0 0 24 24"><path d="M20 4H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        </div>
        <div class="contact-text">hello@kookykafe.com</div>
      </a>
    </div>
  </div>
</div>

<script>
const scene = document.getElementById('scene');
const card  = document.getElementById('card');
const particlesContainer = document.getElementById('particles');
let flipped = false;

scene.addEventListener('click', () => {
  flipped = !flipped;
  card.classList.toggle('flipped', flipped);
});

scene.addEventListener('mousemove', e => {
  if (flipped) return;
  const r = scene.getBoundingClientRect();
  const x = (e.clientX - r.left) / r.width - 0.5;
  const y = (e.clientY - r.top)  / r.height - 0.5;
  card.style.transform = `rotateY(${x*25}deg) rotateX(${-y*20}deg)`;
});

scene.addEventListener('mouseleave', () => {
  if (!flipped) card.style.transform = `rotateY(0deg) rotateX(0deg)`;
});

function createParticle() {
  const p = document.createElement('div');
  p.className = 'particle';
  p.style.left = Math.random() * 100 + 'vw';
  p.style.top = '100vh';
  p.style.animationDuration = (Math.random() * 3 + 2) + 's';
  particlesContainer.appendChild(p);
  setTimeout(() => p.remove(), 5000);
}
setInterval(createParticle, 150);
</script>
</body>
</html>
