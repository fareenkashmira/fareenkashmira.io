<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Digital Menus — Black Haven</title>

  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>

  <style>
    :root {
      --navy:#0f1e3d;
      --gold:#c9a84c;
      --gold-light:#e5c97a;
      --white:#ffffff;
      --blush:#fce8ee;
      --gold-pale:#fdf4e0;
      --text:#4a5878;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family:'DM Sans', sans-serif;
      background:linear-gradient(160deg,#ffffff 0%,#fff5e8 55%,#fdf4e0 100%);
      color:var(--navy);
    }

    nav {
      position:fixed;
      top:0; left:0; right:0;
      padding:1.2rem 2rem;
      display:flex;
      justify-content:space-between;
      background:rgba(255,255,255,.9);
      backdrop-filter:blur(10px);
      border-bottom:1px solid #eee;
    }

    .nav-logo {
      font-family:'Playfair Display', serif;
      font-weight:900;
      color:var(--navy);
      text-decoration:none;
    }

    .nav-logo span { color:var(--gold); }

    .hero {
      padding:8rem 2rem 3rem;
      text-align:center;
    }

    .hero h1 {
      font-family:'Playfair Display', serif;
      font-size:2.5rem;
      font-weight:900;
    }

    .hero h1 em {
      color:var(--gold);
      font-style:italic;
    }

    .hero p {
      margin-top:10px;
      color:var(--text);
      font-size:.95rem;
    }

    .divider {
      width:60px;
      height:2px;
      background:linear-gradient(90deg,var(--gold),var(--blush));
      margin:20px auto;
    }

    .buttons {
      max-width:420px;
      margin:0 auto 4rem;
      padding:0 1.5rem;
      display:flex;
      flex-direction:column;
      gap:14px;
    }

    .btn {
      text-decoration:none;
      padding:14px;
      border-radius:6px;
      text-align:center;
      font-size:.8rem;
      letter-spacing:.08em;
      text-transform:uppercase;
      border:1px solid rgba(26,45,90,.15);
      color:var(--navy);
      background:#fff;
      transition:.25s;
    }

    .btn:hover {
      transform:translateY(-2px);
      box-shadow:0 10px 25px rgba(0,0,0,.08);
      border-color:var(--gold);
      color:var(--gold);
    }

    .btn.primary {
      background:var(--navy);
      color:#fff;
      border:none;
    }

    .btn.primary:hover {
      background:var(--gold);
    }

  </style>
</head>

<body>

  <nav>
    <a href="index.html" class="nav-logo">Black<span>Haven</span></a>
  </nav>

  <section class="hero">
    <h1>Digital <em>Menus</em></h1>
    <p>Select a menu style to get started</p>
    <div class="divider"></div>
  </section>

  <div class="buttons">

    <a href="bistro-menu.html" class="btn primary">Bistro Warm</a>

    <a href="cafe-menu.html" class="btn">Garden Fresh</a>

    <a href="bar-menu.html" class="btn">Bar Noir</a>

    <a href="bakery-menu.html" class="btn">Patisserie Rose</a>

    <a href="fine-dining-menu.html" class="btn">Fine Dining</a>

    <a href="rooftop-menu.html" class="btn">Rooftop Blue</a>

  </div>

</body>
</html>
