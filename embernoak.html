<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noir Gold — Virtual Visiting Card</title>
<link href="https://fonts.googleapis.com/css2?family=Alex+Brush&family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--black:#060606;--gold:#c9a84c;--gold-light:#e5c97a;--cream:#f0e8d8;--muted:#7a6a58;--maroon:#8b0022;}
body{background:var(--black);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;font-family:'DM Sans',sans-serif;padding:2rem;color:var(--cream);}
body::before{content:'';position:fixed;inset:0;background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");pointer-events:none;z-index:999;opacity:.3}
nav{position:fixed;top:0;left:0;right:0;z-index:900;padding:16px 40px;display:flex;justify-content:space-between;align-items:center;background:rgba(6,6,6,.92);border-bottom:.5px solid rgba(201,168,76,.15);backdrop-filter:blur(12px)}
.nav-logo{font-family:'Cinzel',serif;font-size:12px;color:var(--gold);letter-spacing:4px;text-decoration:none}
.nav-back{font-size:10px;color:var(--muted);text-decoration:none;letter-spacing:3px;text-transform:uppercase;transition:color .3s}
.nav-back:hover{color:var(--gold)}
.page-label{font-size:9px;letter-spacing:5px;color:rgba(201,168,76,.4);text-transform:uppercase;margin-bottom:1.5rem;display:flex;align-items:center;gap:12px}
.page-label::before,.page-label::after{content:'';width:28px;height:.5px;background:var(--gold);opacity:.4}
.hint{font-size:9px;color:rgba(201,168,76,.35);letter-spacing:3px;text-transform:uppercase;margin-top:1.5rem;display:flex;align-items:center;gap:8px}
.hint-icon{display:inline-block;animation:spin 3s ease-in-out infinite;font-style:normal}
@keyframes spin{0%,100%{transform:rotateY(0)}50%{transform:rotateY(40deg)}}

.scene{width:360px;height:290px;perspective:1200px;cursor:pointer}
.card-inner{width:100%;height:100%;position:relative;transform-style:preserve-3d;transition:transform .75s cubic-bezier(.4,.2,.2,1)}
.scene.flipped .card-inner{transform:rotateY(180deg)}
.face{position:absolute;inset:0;backface-visibility:hidden;-webkit-backface-visibility:hidden;overflow:hidden}
.face-back{transform:rotateY(180deg)}

/* FRONT */
.front{background:#080808;border:.5px solid rgba(201,168,76,.18);position:relative;display:flex;align-items:center;justify-content:center}
.front::before{content:'';position:absolute;inset:10px;border:.5px solid rgba(201,168,76,.1);pointer-events:none}
.cnc{position:absolute;width:12px;height:12px;border-color:var(--gold);border-style:solid}
.cnc.tl{top:15px;left:15px;border-width:1px 0 0 1px}
.cnc.tr{top:15px;right:15px;border-width:1px 1px 0 0}
.cnc.bl{bottom:15px;left:15px;border-width:0 0 1px 1px}
.cnc.br{bottom:15px;right:15px;border-width:0 1px 1px 0}
.front-ct{text-align:center;padding:1rem;position:relative;z-index:1}
.f-monogram{font-family:'Cinzel',serif;font-size:10px;color:rgba(201,168,76,.4);letter-spacing:5px;margin-bottom:16px}
.f-name{font-family:'Alex Brush',cursive;font-size:38px;color:var(--gold-light);line-height:1.1;margin-bottom:10px;text-shadow:0 0 20px rgba(201,168,76,.2)}
.f-rule{width:40px;height:.5px;background:linear-gradient(90deg,transparent,var(--gold),transparent);margin:0 auto 10px}
.f-person{font-family:'Cormorant Garamond',serif;font-size:11px;color:rgba(240,232,216,.55);letter-spacing:1.5px;margin-bottom:6px}
.f-role{font-family:'Cormorant Garamond',serif;font-size:10px;font-style:italic;color:var(--muted);letter-spacing:2px;margin-bottom:8px}
.f-url{font-size:7px;color:rgba(122,106,88,.45);letter-spacing:1.5px}
.gold-line{position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--gold),var(--maroon),var(--gold),transparent)}
.bg-script{position:absolute;font-family:'Alex Brush',cursive;font-size:130px;color:rgba(201,168,76,.03);bottom:-20px;right:-10px;line-height:1;pointer-events:none}

/* BACK */
.back{background:#0a0a0a;border:.5px solid rgba(201,168,76,.12);position:relative;display:flex;flex-direction:column;justify-content:center;padding:32px 36px}
.back::before{content:'';position:absolute;left:0;top:0;bottom:0;width:3px;background:linear-gradient(to bottom,transparent,var(--gold),var(--maroon),transparent)}
.b-label{font-family:'Alex Brush',cursive;font-size:20px;color:rgba(201,168,76,.55);margin-bottom:16px}
.b-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;font-size:10px;color:rgba(240,232,216,.55)}
.b-icon{width:13px;height:13px;fill:rgba(201,168,76,.45);flex-shrink:0}

@media(max-width:500px){.scene{width:300px;height:240px}}
</style>
</head>

  <a href="visitingcards.html" class="nav-logo">Ember & Oak</a>
  <a href="visitingcards.html" class="nav-back">&#8592; Back</a>
